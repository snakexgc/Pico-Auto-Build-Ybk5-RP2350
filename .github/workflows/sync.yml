name: Upstream Sync

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: "0 6 * * *" # every day
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v4

      # Step 2: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: polhenarejos/pico-fido
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # automatically generated, no need to set

          # Set test_mode true to run tests instead of the true action!!
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 由于上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次。"
          exit 1

      # GitHub's GITHUB_TOKEN pushes do not trigger push-based workflows,
      # so we explicitly dispatch the build after sync when new commits arrived.
      - name: Trigger build after sync
        if: steps.sync.outputs.has_new_commits == 'true'
        run: gh workflow run Pico_Auto_Build.yml --repo "${GITHUB_REPOSITORY}" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
